# Temporary HTTP-only config used before the TLS certificate exists.
# deploy/scripts/install-server.sh replaces this with agents.catch44.co.il.conf after certbot.
server {
    listen 80;
    listen [::]:80;
    server_name agents.catch44.co.il;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'Awaiting TLS certificate\n';
        add_header Content-Type text/plain;
    }
}
